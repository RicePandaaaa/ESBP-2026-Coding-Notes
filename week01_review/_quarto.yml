project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - 00_glossary.qmd
    - 01_output_vs_state.qmd
    - 02_variables_expressions_state.qmd
    - 03_types_casting_truthiness.qmd
    - 04_comparisons_boundaries.qmd
    - 05_boolean_combinations.qmd
    - 06_traps_and_evidence.qmd
    - 07_synthesis.qmd

website:
  title: "ENGR 102 Bridge — Week 1 Review Sheets"
  page-navigation: true
  navbar:
    left:
      - text: "Start Here"
        href: index.qmd
      - text: "Glossary"
        href: 00_glossary.qmd
      - text: "Day 1"
        href: 01_output_vs_state.qmd
      - text: "Day 2"
        href: 02_variables_expressions_state.qmd
      - text: "Day 3"
        href: 03_types_casting_truthiness.qmd
      - text: "Day 4"
        href: 04_comparisons_boundaries.qmd
      - text: "Day 5"
        href: 05_boolean_combinations.qmd
      - text: "Traps"
        href: 06_traps_and_evidence.qmd
      - text: "Synthesis"
        href: 07_synthesis.qmd

format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    toc-depth: 2
    code-copy: true
    code-overflow: wrap
    df-print: kable
  pdf:
    documentclass: article
    geometry:
      - margin=0.6in
    fontsize: 10pt
    colorlinks: true
    code-block-bg: true

# Do not execute code cells by default: most snippets are illustrative and some
# (bare-expression examples) must be SHOWN without running. Individual cells can
# opt in with `#| eval: true`.
execute:
  eval: false
  echo: true
  warning: false
