<!-- Adds a "Download PDF" link to each review sheet. The PDF is generated by
     tools/make_pdfs.py (headless-Chrome print of this very page), so it looks
     identical to the HTML. Only week pages get a link, and only if the PDF
     actually exists next to the page (a freshly added .qmd shows no link
     until make_pdfs.py has been run). -->
<script>
  (function () {
    if (!/week\d+/.test(window.location.pathname)) return;
    var page = window.location.pathname.split("/").pop() || "index.html";
    var pdfHref = page.replace(/\.html?$/, "") + ".pdf";

    function insertLink() {
      var link = document.createElement("a");
      link.href = pdfHref;
      link.target = "_blank";
      link.rel = "noopener";
      link.className = "btn btn-sm btn-outline-secondary pdf-download-link";
      link.innerHTML = "&#128462; Download this sheet as PDF";

      // Prefer the right margin (where "Other Formats" used to live); fall
      // back to just under the title block.
      var margin = document.getElementById("quarto-margin-sidebar");
      var titleBlock = document.getElementById("title-block-header");
      if (margin) {
        var holder = document.createElement("div");
        holder.className = "pdf-download-holder";
        holder.appendChild(link);
        margin.appendChild(holder);
      } else if (titleBlock) {
        titleBlock.appendChild(link);
      }
    }

    if (window.location.protocol === "file:") {
      // fetch() can't probe file:// URLs; assume the PDF is there.
      insertLink();
    } else {
      fetch(pdfHref, { method: "HEAD" })
        .then(function (resp) { if (resp.ok) insertLink(); })
        .catch(function () { /* no PDF -> no link */ });
    }
  })();
</script>
