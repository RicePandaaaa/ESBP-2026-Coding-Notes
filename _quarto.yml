project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - week01/*.qmd

website:
  title: "ENGR 102 Bridge — Review Sheets"
  page-navigation: true
  navbar:
    left:
      - text: "Start Here"
        href: index.qmd
      - text: "Week 1"
        menu:
          - text: "Day 1 — Humble Line of Code"
            href: week01/01_humble_line_of_code.qmd


format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    toc-expand: 3
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    df-print: kable
    include-after-body: pdf-link.html

# PDFs are NOT generated by Quarto's LaTeX pipeline (it ignores the site CSS:
# no red trap bands, no code backgrounds, wrong fonts, full-width images).
# Instead run `python tools/make_pdfs.py` after `quarto render` — it prints
# each rendered HTML page to PDF with headless Chrome/Edge so the PDF matches
# the site exactly. PDFs land next to the source .qmd files and are published
# as plain resources, so deployment (Posit Connect Cloud) needs no browser.
resources:
  - "week*/*.pdf"

# Do not execute code cells by default: most snippets are illustrative and some
# (bare-expression examples) must be SHOWN without running. Individual cells can
# opt in with `#| eval: true`.
execute:
  eval: false
  echo: true
  warning: false
