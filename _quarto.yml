format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    toc-depth: 2
    code-copy: true
    code-overflow: wrap
    df-print: kable
  pdf:
    documentclass: article
    geometry:
      - margin=0.6in
    fontsize: 10pt
    colorlinks: true
    code-block-bg: true

# Do not execute code cells by default: most snippets are illustrative and some
# (bare-expression examples) must be SHOWN without running. Individual cells can
# opt in with `#| eval: true`.
execute:
  eval: false
  echo: true
  warning: false
